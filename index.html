<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>LoL Wheel</title>

<style>

body{

background:linear-gradient(180deg,#050505,#140000);

font-family:Arial;

color:white;

text-align:center;

margin:0;

}



#wheel{

width:600px;

height:600px;

border-radius:50%;

border:8px solid #300000;

margin:auto;

position:relative;

overflow:hidden;

transition:4s cubic-bezier(.17,.67,.2,1);

}



.slice{

position:absolute;

width:50%;

height:50%;

transform-origin:100% 100%;

left:0;

top:0;

display:flex;

align-items:center;

justify-content:center;

}



.slice img{

width:60px;

height:60px;

border-radius:50%;

border:2px solid black;

}



#pointer{

width:0;

height:0;

border-left:20px solid transparent;

border-right:20px solid transparent;

border-top:40px solid red;

margin:auto;

}



button{

padding:10px 20px;

border:none;

margin:5px;

border-radius:6px;

font-weight:bold;

cursor:pointer;

}



.win{

background:#1f8f5f;

color:white;

}



.lose{

background:#a12a2a;

color:white;

}



.reroll{

background:#8a2f6b;

color:white;

}



#popup{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.8);

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

}



#popup img{

width:900px;

border-radius:10px;

}



#champName{

font-size:40px;

font-weight:bold;

margin-top:10px;

}



#lane{

font-size:25px;

color:#bbb;

}



.panel{

position:fixed;

top:100px;

width:200px;

background:#111;

padding:10px;

}



#blacklist{

right:0;

}



#wins{

left:0;

}



</style>

</head>



<body>



<h1>LoL Wheel</h1>



<div id="pointer"></div>



<div id="wheel"></div>



<br>



<button onclick="spin()">SPIN</button>

<button onclick="resetAll()">RESET</button>



<h3>

Wins: <span id="w">0</span>

Losses: <span id="l">0</span>

Winrate: <span id="wr">0</span>%

Remaining: <span id="r">0</span>

Revive: <span id="rev">0</span>

</h3>



<div id="popup">



<img id="splash">



<div id="champName"></div>

<div id="lane"></div>



<br>



<button class="win" onclick="win()">KAZANDIM</button>

<button class="lose" onclick="lose()">KAYBETTİM</button>

<button class="reroll" onclick="reroll()">YENİDEN</button>



</div>



<div class="panel" id="blacklist">

<h3>Blacklist</h3>

<div id="bList"></div>

</div>



<div class="panel" id="wins">

<h3>Wins</h3>

<div id="wList"></div>

</div>



<script>



let version="13.24.1";



let allChampions=[];

let available=[];

let blacklist=[];

let winsList=[];



let wins=0;

let losses=0;

let revive=0;

let streak=0;



let current;



let lanes=[

"TOP",

"MID",

"JUNGLE",

"ADC",

"SUPPORT"

];



function save(){



localStorage.setItem("available",JSON.stringify(available));

localStorage.setItem("blacklist",JSON.stringify(blacklist));

localStorage.setItem("winsList",JSON.stringify(winsList));

localStorage.setItem("wins",wins);

localStorage.setItem("losses",losses);

localStorage.setItem("revive",revive);

localStorage.setItem("streak",streak);



}



function load(){



if(localStorage.getItem("available")){

available=JSON.parse(localStorage.getItem("available"));

}else{

available=[...allChampions];

}



if(localStorage.getItem("blacklist"))

blacklist=JSON.parse(localStorage.getItem("blacklist"));



if(localStorage.getItem("winsList"))

winsList=JSON.parse(localStorage.getItem("winsList"));



wins=Number(localStorage.getItem("wins"))||0;

losses=Number(localStorage.getItem("losses"))||0;

revive=Number(localStorage.getItem("revive"))||0;

streak=Number(localStorage.getItem("streak"))||0;



}



function updateStats(){



document.getElementById("w").innerText=wins;

document.getElementById("l").innerText=losses;



let total=wins+losses;



let rate= total? Math.round(wins/total*100):0;



document.getElementById("wr").innerText=rate;



document.getElementById("r").innerText=available.length;

document.getElementById("rev").innerText=revive;



}



function drawWheel(){



let wheel=document.getElementById("wheel");

wheel.innerHTML="";



let angle=360/available.length;



available.forEach((c,i)=>{



let d=document.createElement("div");

d.className="slice";



d.style.transform=

`rotate(${i*angle}deg) skewY(${90-angle}deg)`;



let img=document.createElement("img");



img.src=

`https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${c.image.full}`;



img.style.transform=

`skewY(-${90-angle}deg) rotate(${angle/2}deg)`;



d.appendChild(img);



wheel.appendChild(d);



});



}



function spin(){



let index=

Math.floor(Math.random()*available.length);



current=available[index];



let angle=360/available.length;



let deg=

360*5-(index*angle);



document.getElementById("wheel")

.style.transform=`rotate(${deg}deg)`;



setTimeout(()=>{

showPopup();

},4000);



}



function showPopup(){



document.getElementById("popup")

.style.display="flex";



document.getElementById("splash")

.src=

`https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${current.id}_0.jpg`;



document.getElementById("champName")

.innerText=current.id.toUpperCase();



let lane=

lanes[Math.floor(Math.random()*lanes.length)];



document.getElementById("lane")

.innerText=lane;



}



function win(){



wins++;

streak++;



winsList.push(current);



if(streak==5){

revive++;

streak=0;

}



updateStats();

updateWins();



save();



close();



}



function lose(){



losses++;

streak=0;



blacklist.push(current);



available=

available.filter(c=>c.id!=current.id);



updateStats();

updateBlack();



drawWheel();



save();



close();



}



function reroll(){

close();

spin();

}



function close(){

document.getElementById("popup")

.style.display="none";

}



function updateBlack(){



let div=

document.getElementById("bList");



div.innerHTML="";



blacklist.forEach(c=>{



let img=document.createElement("img");



img.src=

`https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${c.image.full}`;



img.width=40;



div.appendChild(img);



});



}



function updateWins(){



let div=

document.getElementById("wList");



div.innerHTML="";



winsList.forEach(c=>{



let img=document.createElement("img");



img.src=

`https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${c.image.full}`;



img.width=40;



div.appendChild(img);



});



}



function resetAll(){



localStorage.clear();



available=[...allChampions];

blacklist=[];

winsList=[];



wins=0;

losses=0;

revive=0;

streak=0;



updateStats();

updateBlack();

updateWins();

drawWheel();



}



fetch(
`https://ddragon.leagueoflegends.com/cdn/${version}/data/en_US/champion.json`
)

.then(r=>r.json())

.then(d=>{

allChampions = Object.values(d.data);

load();

if(available.length === 0){

available=[...allChampions];

}

drawWheel();

updateStats();

updateBlack();

updateWins();

save();

});



</script>



</body>

</html>
