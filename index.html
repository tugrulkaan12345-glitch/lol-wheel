<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>LoL Wheel</title>

<style>
body{
background:linear-gradient(180deg,#050505,#140000);
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

#wheel{
width:600px;
height:600px;
border-radius:50%;
border:8px solid #300000;
margin:40px auto;
position:relative;
overflow:hidden;
transition: transform 4s cubic-bezier(.17,.67,.2,1);
background:#0b0000;
box-shadow:0 0 25px #ff000033;
}

#wheel img{
position:absolute;
width:52px;
height:52px;
border-radius:50%;
border:2px solid black;
}

#pointer{
width:0;
height:0;
border-left:22px solid transparent;
border-right:22px solid transparent;
border-top:45px solid red;
margin:auto;
}

button{
padding:10px 22px;
border:none;
margin:5px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.win{background:#1f8f5f;}
.lose{background:#a12a2a;}
.reroll{background:#8a2f6b;}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

#popup img{
width:800px;
border-radius:10px;
box-shadow:0 0 40px black;
}

#champName{font-size:42px;font-weight:bold;margin-top:10px;}
#lane{font-size:24px;color:#bbb;}

.panel{
position:fixed;
top:120px;
width:200px;
background:#111;
padding:10px;
min-height:120px;
}

#wins{left:0;}
#blacklist{right:0;}

.panel img{
margin:3px;
cursor:pointer;
transition:.2s;
}

.panel img:hover{
transform:scale(1.2);
}
</style>
</head>

<body>

<h1>LoL Wheel</h1>

<div id="pointer"></div>
<div id="wheel"></div>

<button onclick="spin()">SPIN</button>
<button onclick="resetAll()">RESET</button>

<h3>
Wins: <span id="w">0</span>
Losses: <span id="l">0</span>
Winrate: <span id="wr">0</span>%
Remaining: <span id="r">0</span>
Revive: <span id="rev">0</span>
</h3>

<div id="popup">
<img id="splash">
<div id="champName"></div>
<div id="lane"></div>
<br>
<button class="win" onclick="win()">KAZANDIM</button>
<button class="lose" onclick="lose()">KAYBETTİM</button>
<button class="reroll" onclick="reroll()">YENİDEN</button>
</div>

<div class="panel" id="wins">
<h3>Wins</h3>
<div id="wList"></div>
</div>

<div class="panel" id="blacklist">
<h3>Blacklist (tıkla revive)</h3>
<div id="bList"></div>
</div>

<script>

let version;
let allChampions=[];
let available=[];
let blacklist=[];
let winsList=[];

let wins=0;
let losses=0;
let revive=0;
let streak=0;

let current;
let currentRotation = 0;

let lanes=["TOP","MID","JUNGLE","ADC","SUPPORT"];

/* LOAD */
function load(){
try{
available=JSON.parse(localStorage.getItem("available")) || [];
blacklist=JSON.parse(localStorage.getItem("blacklist")) || [];
winsList=JSON.parse(localStorage.getItem("winsList")) || [];
}catch{
available=[];
blacklist=[];
winsList=[];
}

wins=Number(localStorage.getItem("wins"))||0;
losses=Number(localStorage.getItem("losses"))||0;
revive=Number(localStorage.getItem("revive"))||0;
streak=Number(localStorage.getItem("streak"))||0;
}

/* SAVE */
function save(){
localStorage.setItem("available",JSON.stringify(available));
localStorage.setItem("blacklist",JSON.stringify(blacklist));
localStorage.setItem("winsList",JSON.stringify(winsList));
localStorage.setItem("wins",wins);
localStorage.setItem("losses",losses);
localStorage.setItem("revive",revive);
localStorage.setItem("streak",streak);
}

/* STATS */
function updateStats(){
document.getElementById("w").innerText=wins;
document.getElementById("l").innerText=losses;

let total=wins+losses;
document.getElementById("wr").innerText=total?Math.round(wins/total*100):0;

document.getElementById("r").innerText=available.length;
document.getElementById("rev").innerText=revive;
}

/* 🔥 YENİ WHEEL (çember sistemi) */
function drawWheel(){

if(available.length===0) return;

let wheel=document.getElementById("wheel");
wheel.innerHTML="";

let center = 300;
let radius = 250;

available.forEach((c,i)=>{

let angle = (i / available.length) * 360;
let rad = angle * (Math.PI / 180);

let x = center + radius * Math.cos(rad) - 26;
let y = center + radius * Math.sin(rad) - 26;

let img=document.createElement("img");

img.src=`https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${c.id}.png`;

img.style.left=x+"px";
img.style.top=y+"px";

wheel.appendChild(img);

});
}

/* SPIN */
function spin(){

if(available.length===0){
alert("Yükleniyor...");
return;
}

let index=Math.floor(Math.random()*available.length);
current=available[index];

let extra=360*(5+Math.random()*3);
currentRotation += extra;

document.getElementById("wheel").style.transform=`rotate(${currentRotation}deg)`;

setTimeout(()=>{showPopup();},4000);
}

/* POPUP */
function showPopup(){
document.getElementById("popup").style.display="flex";

document.getElementById("splash").src=
`https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${current.id}_0.jpg`;

document.getElementById("champName").innerText=current.id.toUpperCase();

let lane=lanes[Math.floor(Math.random()*lanes.length)];
document.getElementById("lane").innerText=lane;
}

/* GAME */
function win(){
wins++;
streak++;
winsList.push(current);

if(streak==5){
revive++;
alert("🔥 Revive kazandın!");
streak=0;
}

updateStats();
updateWins();
save();
close();
}

function lose(){
losses++;
streak=0;

blacklist.push(current);
available=available.filter(c=>c.id!=current.id);

updateStats();
updateBlack();
drawWheel();
save();
close();
}

function reroll(){
close();
spin();
}

function close(){
document.getElementById("popup").style.display="none";
}

/* REVIVE */
function updateBlack(){
let div=document.getElementById("bList");
div.innerHTML="";

blacklist.forEach(c=>{
let img=document.createElement("img");
img.src=`https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${c.id}.png`;
img.width=40;

img.onclick=()=>{
if(revive<=0){
alert("Revive yok!");
return;
}

revive--;
available.push(c);
blacklist=blacklist.filter(x=>x.id!==c.id);

drawWheel();
updateBlack();
updateStats();
save();
};

div.appendChild(img);
});
}

function updateWins(){
let div=document.getElementById("wList");
div.innerHTML="";

winsList.forEach(c=>{
let img=document.createElement("img");
img.src=`https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${c.id}.png`;
img.width=40;
div.appendChild(img);
});
}

/* RESET */
function resetAll(){
localStorage.clear();

available=[...allChampions];
blacklist=[];
winsList=[];

wins=0;
losses=0;
revive=0;
streak=0;

updateStats();
updateBlack();
updateWins();
drawWheel();
}

/* START */
function start(){
fetch("https://ddragon.leagueoflegends.com/api/versions.json")
.then(r=>r.json())
.then(v=>{
version=v[0];
return fetch(`https://ddragon.leagueoflegends.com/cdn/${version}/data/en_US/champion.json`);
})
.then(r=>r.json())
.then(d=>{

allChampions=Object.values(d.data);

load();

if(!available.length){
available=[...allChampions];
}

drawWheel();
updateStats();
updateBlack();
updateWins();
save();

})
.catch(()=>{
alert("API hatası!");
});
}

start();

</script>

</body>
</html>
